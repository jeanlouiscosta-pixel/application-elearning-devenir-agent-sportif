<script>
const M=[
{id:'ds',title:'Droit du Sport',desc:'Code du sport, organisation, réglementation des agents',icon:'⚖️',color:'#3182ce',
lessons:[
{id:'ds1',title:'Organisation du sport en France',dur:'25 min',ct:`<h2>Organisation du sport en France</h2><p>Le sport en France repose sur un modèle pyramidal associant l'État, le mouvement sportif et les collectivités territoriales. Comprendre cette organisation est essentiel pour tout futur agent sportif.</p><h3>Le Ministère chargé des Sports</h3><p>Le Ministère définit la politique sportive nationale, réglemente les activités physiques et sportives, contrôle les fédérations et veille au respect du Code du sport. Il délivre les agréments et délégations aux fédérations sportives.</p><h3>Le Comité National Olympique et Sportif Français (CNOSF)</h3><p>Le CNOSF est l'organe de représentation du mouvement sportif français. Il regroupe l'ensemble des fédérations sportives agréées et coordonne leurs actions. Il abrite également la <strong>Commission Interfédérale des Agents Sportifs (CIAS)</strong>, chargée d'organiser l'épreuve générale de l'examen d'agent sportif.</p><div class="hl">Le CNOSF est l'interlocuteur privilégié entre le mouvement sportif et les pouvoirs publics. La CIAS qu'il abrite est un acteur clé dans la régulation de la profession d'agent sportif.</div><h3>Les fédérations sportives</h3><p>Les fédérations sont des associations qui participent à la mise en œuvre de la politique sportive. On distingue deux types :</p><ul><li><strong>Fédérations délégataires</strong> : elles disposent d'un monopole pour organiser les compétitions officielles dans leur discipline et délivrent les licences d'agent sportif</li><li><strong>Fédérations agréées</strong> : elles participent à la mission de service public du sport sans disposer de délégation</li></ul><h3>Les ligues professionnelles</h3><p>Dans certaines disciplines (football, rugby, basketball, handball), des ligues professionnelles gèrent les compétitions professionnelles par délégation de la fédération. La LFP (Ligue de Football Professionnel), la LNB (Ligue Nationale de Basket) ou la LNH (Ligue Nationale de Handball) sont des exemples majeurs.</p><p>L'agent sportif interagit avec l'ensemble de ces acteurs dans l'exercice de son activité professionnelle.</p>`},
{id:'ds2',title:'Le Code du Sport : articles clés',dur:'30 min',ct:`<h2>Le Code du Sport : dispositions relatives aux agents sportifs</h2><p>Le Code du Sport consacre les articles L. 222-5 à L. 222-22 aux agents sportifs. Ces textes constituent le socle juridique de la profession.</p><h3>Article L. 222-7 : Définition de l'activité</h3><p>L'activité d'agent sportif consiste à mettre en rapport, contre rémunération, les parties intéressées à la conclusion d'un contrat relatif à l'exercice rémunéré d'une activité sportive ou d'entraînement, ou à la conclusion d'un contrat de transfert d'un sportif.</p><h3>Article L. 222-9 : Obligation de licence</h3><p>L'activité d'agent sportif ne peut être exercée que par une <strong>personne physique</strong> détentrice d'une licence délivrée par la fédération délégataire compétente. Cette licence est :</p><ul><li>Personnelle et incessible</li><li>Valable pour une durée déterminée (généralement 3 ans)</li><li>Renouvelable sous conditions</li><li>Spécifique à une discipline sportive</li></ul><h3>Article L. 222-10 : Plafonnement de la rémunération</h3><p>La rémunération de l'agent ne peut excéder <strong>10 % du montant du contrat</strong> conclu par les parties qu'il a mises en rapport. Elle est versée par le mandant.</p><div class="hl">Si plusieurs agents interviennent dans la même opération, la rémunération cumulée de l'ensemble des agents ne peut dépasser 10 % du contrat.</div><h3>Article L. 222-17 : Sanctions pénales</h3><p>L'exercice de l'activité d'agent sportif sans licence est puni de <strong>2 ans d'emprisonnement et 30 000 € d'amende</strong>. Le versement ou la perception de rémunérations non conformes est puni de la même peine.</p><div class="wn">Le non-respect du Code du sport expose l'agent à des sanctions pénales (emprisonnement, amende) et disciplinaires (suspension ou retrait de licence).</div><h3>Article L. 222-5 : Incompatibilités</h3><p>Certaines personnes ne peuvent exercer l'activité d'agent sportif : les dirigeants de clubs, les entraîneurs, les arbitres, et toute personne ayant fait l'objet de certaines condamnations pénales.</p>`},
{id:'ds3',title:'La licence d\'agent sportif',dur:'25 min',ct:`<h2>La licence d'agent sportif : obtention et renouvellement</h2><p>La licence d'agent sportif est le sésame indispensable pour exercer légalement cette profession en France.</p><h3>Conditions préalables</h3><p>Pour se présenter à l'examen, le candidat doit :</p><ul><li>Être majeur (18 ans minimum)</li><li>Ne pas avoir fait l'objet de condamnations pénales incompatibles</li><li>Ne pas exercer de fonctions incompatibles (dirigeant de club, entraîneur, etc.)</li><li>S'inscrire auprès de la fédération délégataire compétente</li></ul><h3>L'examen : deux épreuves</h3><p><strong>Épreuve générale (CIAS)</strong> : commune à toutes les disciplines, elle porte sur les connaissances juridiques générales (droit du sport, droit des contrats, droit fiscal, droit social, droit des assurances, droit des sociétés et associations). Format QCM, note minimale de 10/20.</p><p><strong>Épreuve spécifique (fédération)</strong> : propre à chaque discipline, elle porte sur les règlements fédéraux, nationaux et internationaux. Pour le football, elle couvre les Statuts FIFA, le Règlement des Agents FIFA, le RSTJ et les Statuts et Règlements de la FFF.</p><div class="hl">Calendrier 2025-2026 : Épreuve spécifique FFF le 23 mars 2026, Épreuve générale CIAS en novembre 2026, Examen FIFA les 28-30 avril 2026.</div><h3>Renouvellement</h3><p>La licence doit être renouvelée périodiquement. Le renouvellement peut être soumis à des conditions de formation continue et au respect des obligations déontologiques.</p>`},
{id:'ds4',title:'Lutte contre le dopage',dur:'20 min',ct:`<h2>Lutte contre le dopage</h2><p>La lutte contre le dopage est un pilier du droit du sport. L'agent sportif doit en connaître les mécanismes pour protéger ses clients et éviter toute implication.</p><h3>Cadre juridique national</h3><p>En France, la lutte antidopage est régie par les articles L. 232-1 et suivants du Code du sport. L'Agence Française de Lutte contre le Dopage (AFLD) est l'autorité publique indépendante chargée de la prévention, des contrôles et des sanctions.</p><h3>Le Code mondial antidopage</h3><p>Au niveau international, l'Agence Mondiale Antidopage (AMA/WADA) établit les règles via le Code mondial antidopage, que les fédérations internationales et nationales doivent transposer.</p><h3>Les infractions antidopage</h3><ul><li>Présence d'une substance interdite dans l'organisme</li><li>Usage ou tentative d'usage d'une substance ou méthode interdite</li><li>Refus ou soustraction à un contrôle</li><li>Falsification ou tentative de falsification</li><li>Possession de substances interdites</li><li>Trafic ou tentative de trafic</li><li><strong>Complicité</strong> (y compris pour un agent sportif)</li><li>Administration ou tentative d'administration</li></ul><div class="wn">Un agent sportif qui encouragerait, faciliterait ou dissimulerait le dopage d'un sportif s'expose à des poursuites pénales et au retrait de sa licence. La complicité de dopage est une infraction à part entière.</div><h3>Sanctions</h3><p>Les sanctions vont de l'avertissement à la suspension à vie, selon la gravité de l'infraction. Les sanctions pénales peuvent atteindre 5 ans d'emprisonnement et 75 000 € d'amende pour le trafic.</p>`},
{id:'ds5',title:'Intégrité et paris sportifs',dur:'20 min',ct:`<h2>Intégrité sportive et paris</h2><p>La loi du 12 mai 2010 relative à l'ouverture à la concurrence des jeux en ligne a créé un cadre réglementaire strict pour les paris sportifs en France.</p><h3>L'Autorité Nationale des Jeux (ANJ)</h3><p>L'ANJ (ex-ARJEL) est chargée de réguler les jeux d'argent en ligne, dont les paris sportifs. Elle lutte contre les manipulations de compétitions sportives.</p><h3>Interdictions pour les agents sportifs</h3><p>Les agents sportifs font partie des personnes soumises à des interdictions strictes en matière de paris :</p><ul><li>Interdiction de parier sur les compétitions de leur discipline</li><li>Interdiction d'utiliser des informations privilégiées</li><li>Obligation de signaler toute approche suspecte</li><li>Interdiction de participer à des manipulations de résultats</li></ul><div class="hl">La manipulation des compétitions sportives est punie par l'article 445-1-1 du Code pénal de 5 ans d'emprisonnement et 500 000 € d'amende.</div><h3>Convention du Conseil de l'Europe (Convention de Macolin)</h3><p>La Convention de Macolin (2014) est le premier instrument juridique international contraignant visant à lutter contre la manipulation de compétitions sportives. La France l'a ratifiée.</p><p>L'agent sportif doit être vigilant face à toute tentative de corruption ou de manipulation impliquant ses clients.</p>`},
{id:'ds6',title:'Responsabilité de l\'agent sportif',dur:'20 min',ct:`<h2>Responsabilité civile et pénale de l'agent sportif</h2><p>L'agent sportif engage sa responsabilité à plusieurs niveaux dans l'exercice de ses fonctions.</p><h3>Responsabilité civile contractuelle</h3><p>L'agent est lié à son mandant par un contrat de mandat. Il doit exécuter sa mission avec diligence et dans l'intérêt exclusif de son mandant. En cas de manquement (négligence, mauvais conseil, conflit d'intérêts), il engage sa responsabilité contractuelle et peut être tenu de réparer le préjudice subi.</p><h3>Responsabilité civile délictuelle</h3><p>Envers les tiers (clubs, autres joueurs), l'agent engage sa responsabilité délictuelle s'il cause un dommage par sa faute (diffusion de fausses informations, ingérence dans un contrat existant).</p><h3>Responsabilité pénale</h3><p>L'agent s'expose à des poursuites pénales pour :</p><ul><li>Exercice sans licence (2 ans / 30 000 €)</li><li>Abus de confiance</li><li>Escroquerie</li><li>Blanchiment d'argent</li><li>Complicité de dopage</li><li>Corruption sportive</li></ul><div class="wn">L'assurance responsabilité civile professionnelle est fortement recommandée, voire obligatoire selon les fédérations, pour couvrir les risques liés à l'activité d'agent sportif.</div><h3>Responsabilité disciplinaire</h3><p>Les commissions des agents sportifs des fédérations peuvent sanctionner les agents (avertissement, suspension, retrait de licence) en cas de manquement aux règles déontologiques ou réglementaires.</p>`}
],
quizzes:[

{q:"Quelle est la sanction pénale pour exercice illégal de l'activité d'agent sportif ?",o:["1 an et 15 000 €","2 ans et 30 000 €","3 ans et 45 000 €","6 mois et 7 500 €"],c:1,e:"L'article L. 222-17 prévoit 2 ans d'emprisonnement et 30 000 € d'amende."},
{q:"Quel organisme organise l'épreuve générale de l'examen d'agent sportif ?",o:["Le Ministère des Sports","La FIFA","La CIAS (CNOSF)","La fédération délégataire"],c:2,e:"La CIAS, rattachée au CNOSF, organise l'épreuve générale commune à toutes les disciplines."},
{q:"La licence d'agent sportif est :",o:["Cessible à un associé","Valable à vie","Personnelle et incessible","Délivrée par le Ministère"],c:2,e:"La licence est personnelle, incessible et doit être renouvelée périodiquement."},
{q:"Quel est le plafond légal de rémunération d'un agent sportif ?",o:["5 % du contrat","10 % du contrat","15 % du contrat","Aucun plafond"],c:1,e:"L'article L. 222-10 fixe la rémunération maximale à 10 % du contrat conclu."},
{q:"Qui délivre la licence d'agent sportif en France ?",o:["Le CNOSF","Le Ministère des Sports","La fédération délégataire compétente","La FIFA"],c:2,e:"C'est la fédération délégataire de la discipline concernée qui délivre la licence."},
{q:"L'AFLD est :",o:["Une fédération sportive","L'Agence Française de Lutte contre le Dopage","Un syndicat d'agents","L'Autorité des Finances du Sport"],c:1,e:"L'AFLD est l'autorité publique indépendante chargée de la lutte antidopage en France."},
{q:"La manipulation d'une compétition sportive est punie de :",o:["1 an et 15 000 €","3 ans et 75 000 €","5 ans et 500 000 €","10 ans et 1 M€"],c:2,e:"L'article 445-1-1 du Code pénal punit la corruption sportive de 5 ans et 500 000 €."},

]},

{id:'dc',title:'Droit des Contrats',desc:'Contrats sportifs, mandats, transferts, négociation',icon:'📝',color:'#805ad5',
lessons:[
{id:'dc1',title:'Le contrat de travail du sportif',dur:'30 min',ct:`<h2>Le contrat de travail du sportif professionnel</h2><p>Le contrat de travail du sportif professionnel est un contrat spécifique, régi à la fois par le Code du travail et le Code du sport.</p><h3>Le CDD d'usage sportif</h3><p>Selon l'article L. 222-2-4 du Code du sport, le contrat de travail du sportif professionnel est obligatoirement un <strong>CDD d'usage</strong>. Sa durée est comprise entre <strong>1 et 5 saisons sportives</strong>.</p><div class="hl">Particularité majeure : contrairement au droit commun du travail, le CDD sportif peut être renouvelé sans limite et ne se transforme <strong>jamais</strong> en CDI, quel que soit le nombre de renouvellements successifs.</div><h3>Mentions obligatoires</h3><ul><li>Identité des parties (joueur et club employeur)</li><li>Durée du contrat exprimée en saisons sportives</li><li>Rémunération : salaire fixe, primes (de match, de résultat, de classement), avantages en nature</li><li>Conditions de rupture anticipée (clause libératoire éventuelle)</li><li>Clause de médiation ou d'arbitrage</li><li>Droits à l'image</li><li>Obligations sportives et extra-sportives du joueur</li></ul><h3>Homologation</h3><p>Le contrat doit être <strong>homologué</strong> par la fédération ou la ligue professionnelle pour être valide. Sans homologation, le joueur ne peut pas participer aux compétitions officielles. La DNCG (Direction Nationale du Contrôle de Gestion) vérifie la capacité financière du club à honorer le contrat.</p><h3>Rupture du contrat</h3><p>La rupture anticipée d'un CDD sportif obéit à des règles strictes. Elle peut intervenir par accord mutuel, pour faute grave, ou moyennant le paiement d'une indemnité de rupture si une clause libératoire est prévue.</p>`},
{id:'dc2',title:'Le mandat d\'agent sportif',dur:'25 min',ct:`<h2>Le mandat d'agent sportif</h2><p>L'agent sportif ne peut agir qu'en vertu d'un mandat écrit qui le lie à son mandant. Le mandat est le fondement juridique de l'intervention de l'agent.</p><h3>Caractéristiques du mandat</h3><ul><li><strong>Écrit et préalable</strong> : le mandat doit être signé avant toute action de l'agent</li><li><strong>Précis</strong> : il doit indiquer l'identité du mandant, l'objet, la durée et les conditions de rémunération</li><li><strong>Transmis à la fédération</strong> : le mandat doit être déposé auprès de la fédération compétente</li></ul><h3>Interdiction du double mandatement</h3><div class="wn">Un agent ne peut être mandaté que par une seule des parties à une même opération : soit le joueur, soit le club. Le double mandatement pour la même transaction est strictement interdit par la loi.</div><h3>Mandat et sportifs mineurs</h3><p>Pour les sportifs mineurs, des règles spécifiques s'appliquent :</p><ul><li>Le mandat ne peut pas être exclusif</li><li>Les représentants légaux doivent co-signer</li><li>Des protections renforcées s'appliquent</li></ul><h3>Durée et résiliation</h3><p>La durée du mandat est librement fixée par les parties. Le mandant peut résilier le mandat à tout moment, moyennant un préavis raisonnable. L'agent ne peut facturer que les prestations réellement accomplies.</p><h3>Absence de mandat</h3><p>Toute rémunération perçue par un agent sans mandat écrit préalable est <strong>illégale</strong> et peut donner lieu à des poursuites pénales et disciplinaires.</p>`},
{id:'dc3',title:'Négociation et transferts',dur:'25 min',ct:`<h2>Négociation et transferts</h2><p>La négociation de contrats et de transferts est au cœur du métier d'agent sportif. Elle requiert des compétences juridiques, relationnelles et stratégiques.</p><h3>Le processus de transfert</h3><p>Un transfert implique généralement deux opérations juridiques distinctes :</p><ul><li>La résiliation ou le transfert du contrat avec le club d'origine</li><li>La signature d'un nouveau contrat avec le club acquéreur</li></ul><h3>L'indemnité de transfert</h3><p>Lorsqu'un joueur est encore sous contrat, le club acquéreur verse une indemnité de transfert au club cédant. Cette indemnité est négociée entre les deux clubs et tient compte de la valeur du joueur, de la durée restante du contrat et du marché.</p><div class="hl">La rémunération de l'agent est calculée sur le contrat du joueur (salaire), et non sur l'indemnité de transfert entre clubs.</div><h3>Les périodes de transfert (mercato)</h3><p>Les transferts ne peuvent s'effectuer que pendant les fenêtres de transfert fixées par les fédérations et confédérations :</p><ul><li><strong>Mercato d'été</strong> : généralement du 10 juin au 31 août</li><li><strong>Mercato d'hiver</strong> : généralement du 1er au 31 janvier</li></ul><h3>La clause libératoire</h3><p>Certains contrats comportent une clause libératoire (ou « buyout clause ») qui permet au joueur de quitter son club moyennant le paiement d'un montant prédéterminé. L'agent joue un rôle clé dans la négociation de cette clause.</p><h3>Joueurs libres</h3><p>Un joueur en fin de contrat (joueur libre) peut négocier avec tout club sans qu'une indemnité de transfert soit due. L'agent peut négocier avec d'autres clubs dès 6 mois avant la fin du contrat.</p>`},
{id:'dc4',title:'La rémunération de l\'agent',dur:'20 min',ct:`<h2>La rémunération de l'agent sportif</h2><p>La rémunération de l'agent sportif est strictement encadrée par la loi, tant en France qu'au niveau international.</p><h3>Le plafond légal français</h3><p>L'article L. 222-10 du Code du sport fixe le plafond à <strong>10 % du montant du contrat</strong> conclu par les parties mises en rapport. En pratique, les commissions se situent généralement autour de <strong>8 %</strong>.</p><h3>Règles de cumul</h3><div class="hl">Si plusieurs agents interviennent dans la même opération, leur rémunération cumulée ne peut pas dépasser 10 % du contrat. Les agents doivent s'entendre sur la répartition.</div><h3>Qui rémunère l'agent ?</h3><p>L'agent est rémunéré par son mandant :</p><ul><li>Si mandaté par le joueur → le joueur paie</li><li>Si mandaté par le club → le club paie</li><li>Le mandant peut autoriser l'autre partie à payer, mais le mandat doit le prévoir expressément</li></ul><h3>Plafonds FIFA (football international)</h3><p>Le Règlement FIFA 2023 introduit des plafonds spécifiques pour les transactions dépassant 200 000 USD :</p><ul><li>3 % si l'agent représente le club acquéreur</li><li>6 % si l'agent représente le joueur</li><li>10 % si l'agent représente le club vendeur</li></ul><h3>Interdictions</h3><p>L'agent ne peut percevoir aucune rémunération pour un contrat de joueur mineur de moins de 16 ans. Toute rémunération sans mandat écrit est illégale.</p>`},
{id:'dc5',title:'Protection du sportif mineur',dur:'20 min',ct:`<h2>Protection du sportif mineur</h2><p>La protection des sportifs mineurs est une préoccupation majeure du droit du sport, tant au niveau national qu'international.</p><h3>Cadre national</h3><p>En France, un sportif mineur peut signer un contrat de formation (convention de formation) avec un club. Ce contrat n'est pas un contrat de travail mais engage le club à assurer la formation sportive et scolaire du jeune.</p><h3>Le premier contrat professionnel</h3><p>Un joueur formé au sein d'un club bénéficie d'une priorité pour signer son premier contrat professionnel avec ce club (droit de préférence). Si le joueur refuse et signe ailleurs, une indemnité de formation est due au club formateur.</p><h3>Transferts internationaux de mineurs</h3><p>La FIFA interdit en principe les transferts internationaux de joueurs de moins de 18 ans, sauf trois exceptions :</p><ul><li>Les parents du joueur déménagent dans le pays du nouveau club pour des raisons non liées au football</li><li>Le transfert a lieu au sein de l'UE/EEE et le joueur a entre 16 et 18 ans (avec garanties)</li><li>Le joueur vit à proximité d'une frontière nationale (rayon de 50 km)</li></ul><div class="wn">La violation des règles de protection des mineurs est très lourdement sanctionnée par la FIFA : interdiction de recrutement pouvant aller jusqu'à 2 fenêtres de transfert, amendes importantes. Plusieurs grands clubs ont été sanctionnés.</div><h3>Rôle de l'agent</h3><p>L'agent sportif qui intervient auprès de mineurs doit faire preuve d'une vigilance renforcée, respecter les règles spécifiques du mandatement et ne peut percevoir aucune rémunération pour un contrat de joueur de moins de 16 ans.</p>`}
],

{id:'df',title:'Droit Fiscal & Social',desc:'Fiscalité sportive, cotisations, statut de l\'agent',icon:'💰',color:'#d69e2e',
lessons:[
{id:'df1',title:'Fiscalité du sportif professionnel',dur:'25 min',ct:`<h2>Fiscalité du sportif professionnel</h2><p>L'agent sportif doit maîtriser les aspects fiscaux pour conseiller efficacement ses clients sur la structuration de leurs revenus.</p><h3>Imposition des revenus</h3><p>Les revenus du sportif professionnel salarié sont imposés dans la catégorie des <strong>traitements et salaires</strong>. Ils comprennent :</p><ul><li>Le salaire fixe mensuel</li><li>Les primes de match, de résultat et de classement</li><li>Les primes de signature (signing bonus)</li><li>Les avantages en nature (logement, véhicule)</li></ul><h3>Le prélèvement à la source</h3><p>Depuis 2019, l'impôt sur le revenu est prélevé à la source. Le club employeur prélève directement l'impôt sur le salaire du joueur.</p><h3>Cas particuliers</h3><p>Les revenus du sponsoring et des contrats publicitaires personnels peuvent relever des BNC (bénéfices non commerciaux) si le sportif les perçoit directement, ou des revenus de capitaux mobiliers s'ils transitent par une société d'image.</p><div class="hl">L'agent doit être vigilant sur la structuration des revenus de son client : une mauvaise répartition entre salaire et revenus annexes peut entraîner un redressement fiscal.</div>`},
{id:'df2',title:'Droits à l\'image',dur:'20 min',ct:`<h2>Droits à l'image du sportif</h2><p>L'exploitation de l'image du sportif est un enjeu financier majeur que l'agent doit savoir négocier et structurer.</p><h3>Le droit à l'image individuel</h3><p>Chaque sportif dispose d'un droit sur son image qui lui permet d'autoriser ou d'interdire la reproduction et l'utilisation de celle-ci. Ce droit peut être exploité commercialement via des contrats de sponsoring, d'endorsement ou de partenariat.</p><h3>L'ancien droit à l'image collectif</h3><p>Le droit à l'image collectif, instauré par la loi du 15 décembre 2004, permettait aux clubs de verser une partie de la rémunération des joueurs sous forme de redevance d'image (exonérée de cotisations sociales). Ce dispositif a été <strong>abrogé en 2010</strong>.</p><div class="hl">Depuis l'abrogation du droit à l'image collectif en 2010, les revenus d'image sont traités individuellement. L'agent doit négocier séparément les droits d'image dans le contrat du joueur.</div><h3>Structuration via une société d'image</h3><p>Certains sportifs créent une société dédiée à l'exploitation de leur image. Cette structuration doit être conforme aux règles fiscales pour éviter tout risque de requalification ou de redressement.</p><h3>Rôle de l'agent</h3><p>L'agent négocie les contrats d'image, évalue la valeur commerciale de l'image de son client, et veille à la cohérence entre les engagements pris (exclusivités, restrictions).</p>`},
{id:'df3',title:'Fiscalité internationale',dur:'25 min',ct:`<h2>Fiscalité internationale du sportif</h2><p>Les transferts internationaux soulèvent des questions fiscales complexes que l'agent doit anticiper.</p><h3>Conventions fiscales bilatérales</h3><p>La France a signé plus de 120 conventions fiscales bilatérales qui déterminent le lieu d'imposition des revenus. Pour les sportifs, la règle générale est l'imposition dans le pays où l'activité est exercée (pays de la source).</p><h3>Le régime des impatriés</h3><p>Les sportifs s'installant en France peuvent bénéficier du <strong>régime des impatriés</strong> (article 155 B du CGI) qui offre des exonérations partielles pendant 8 ans sur certains revenus. Ce régime est un argument de négociation pour attirer des joueurs étrangers en France.</p><h3>Détachement et expatriation</h3><p>La situation fiscale du joueur transféré dépend de sa résidence fiscale :</p><ul><li><strong>Résident fiscal français</strong> : imposé en France sur ses revenus mondiaux</li><li><strong>Non-résident</strong> : imposé en France uniquement sur ses revenus de source française</li></ul><div class="wn">L'agent doit impérativement recommander à son client de consulter un conseil fiscal spécialisé avant tout transfert international. Les erreurs fiscales peuvent être très coûteuses.</div>`},
{id:'df4',title:'Cotisations sociales et protection',dur:'20 min',ct:`<h2>Cotisations sociales et protection du sportif</h2><p>Le sportif professionnel salarié bénéficie du régime général de la sécurité sociale avec des particularités liées à la brièveté de sa carrière.</p><h3>Cotisations obligatoires</h3><ul><li>Cotisations de sécurité sociale (maladie, vieillesse, famille)</li><li>Cotisations chômage (l'employeur et le salarié)</li><li>Retraite complémentaire (AGIRC-ARRCO)</li><li>CSG et CRDS</li><li>Prévoyance et mutuelle obligatoire</li></ul><h3>La prévoyance spécifique</h3><p>La carrière sportive étant courte (en moyenne 10-15 ans) et exposée aux risques de blessure, la prévoyance est cruciale :</p><ul><li>Garantie incapacité temporaire</li><li>Garantie invalidité permanente</li><li>Garantie décès</li><li>Garantie fin de carrière prématurée</li></ul><div class="hl">Un agent sportif responsable doit systématiquement vérifier que son client dispose de garanties de prévoyance adaptées. Une blessure grave sans couverture peut être financièrement désastreuse.</div><h3>La reconversion</h3><p>Des dispositifs existent pour accompagner la reconversion des sportifs : le bilan de compétences, la VAE (Validation des Acquis de l'Expérience), et les aides spécifiques des fédérations et du Ministère des Sports.</p>`},
{id:'df5',title:'Statut juridique de l\'agent',dur:'20 min',ct:`<h2>Statut juridique de l'agent sportif</h2><p>L'agent sportif exerce une activité indépendante et doit choisir une structure juridique adaptée.</p><h3>Rappel fondamental</h3><div class="hl">Seule une personne physique peut détenir une licence d'agent sportif. La société est le véhicule d'exercice de l'activité, mais la licence reste strictement personnelle et incessible.</div><h3>Les formes juridiques</h3><ul><li><strong>Entreprise individuelle / Micro-entreprise</strong> : simple à créer, adaptée au démarrage, mais responsabilité illimitée et plafonds de chiffre d'affaires</li><li><strong>EURL (Entreprise Unipersonnelle à Responsabilité Limitée)</strong> : protection du patrimoine personnel, souplesse fiscale</li><li><strong>SASU (Société par Actions Simplifiée Unipersonnelle)</strong> : statut de président assimilé salarié, protection sociale renforcée</li><li><strong>SARL / SAS</strong> : pour exercer à plusieurs ou structurer une agence avec des collaborateurs</li></ul><h3>Obligations comptables et fiscales</h3><p>L'agent doit tenir une comptabilité, déclarer et payer la TVA (sauf franchise en micro-entreprise), déclarer ses revenus, et respecter les obligations de transparence auprès de la fédération (déclaration des mandats et commissions).</p><h3>L'assurance RC professionnelle</h3><p>L'assurance responsabilité civile professionnelle est essentielle pour couvrir les risques liés aux conseils et négociations de l'agent.</p>`}
],

{id:'da',title:'Droit des Assurances',desc:'RC professionnelle, assurances sportives, garanties',icon:'🛡️',color:'#319795',
lessons:[
{id:'da1',title:'Principes généraux de l\'assurance',dur:'20 min',ct:`<h2>Principes généraux de l'assurance</h2><p>La connaissance des mécanismes d'assurance est indispensable pour l'agent sportif, tant pour sa propre protection que pour celle de ses clients.</p><h3>Le contrat d'assurance</h3><p>Le contrat d'assurance est un accord par lequel l'assureur s'engage, moyennant le paiement d'une prime par l'assuré, à verser une prestation en cas de réalisation d'un risque déterminé (le sinistre).</p><h3>Éléments clés</h3><ul><li><strong>La prime</strong> : montant payé par l'assuré à l'assureur</li><li><strong>Le sinistre</strong> : réalisation du risque couvert</li><li><strong>La franchise</strong> : somme restant à la charge de l'assuré</li><li><strong>La garantie</strong> : engagement de l'assureur</li><li><strong>L'indemnité</strong> : somme versée en cas de sinistre</li></ul><h3>Principes fondamentaux</h3><p>Le droit des assurances repose sur plusieurs principes :</p><ul><li><strong>Principe indemnitaire</strong> : l'indemnité ne peut excéder le préjudice subi</li><li><strong>Bonne foi</strong> : l'assuré doit déclarer exactement les risques</li><li><strong>Subrogation</strong> : l'assureur se substitue à l'assuré pour récupérer les sommes auprès du responsable</li></ul><div class="hl">L'agent sportif est souvent l'intermédiaire entre le sportif et les compagnies d'assurance. Il doit comprendre les mécanismes pour conseiller efficacement.</div>`},
{id:'da2',title:'RC professionnelle de l\'agent',dur:'20 min',ct:`<h2>Assurance responsabilité civile professionnelle</h2><p>L'assurance RC professionnelle est essentielle pour tout agent sportif. Elle couvre les conséquences financières des erreurs, omissions ou fautes commises dans l'exercice de l'activité.</p><h3>Risques couverts</h3><ul><li>Erreur de conseil (mauvaise évaluation d'un contrat)</li><li>Négligence dans la négociation</li><li>Non-respect des délais (ex : période de transfert)</li><li>Perte de documents importants</li><li>Violation involontaire de la confidentialité</li></ul><h3>Obligation ou recommandation ?</h3><p>Selon les fédérations, l'assurance RC professionnelle peut être obligatoire ou fortement recommandée. Dans tous les cas, exercer sans cette couverture expose l'agent à des risques financiers considérables.</p><div class="wn">Un seul litige avec un client ou un club peut engendrer des dommages et intérêts de plusieurs centaines de milliers d'euros. L'assurance RC professionnelle n'est pas un luxe, c'est une nécessité.</div><h3>Choix de la couverture</h3><p>L'agent doit être attentif au montant des garanties, aux exclusions, à la franchise et au périmètre géographique de la couverture (France, Europe, monde).</p>`},
{id:'da3',title:'Assurance individuelle accident',dur:'20 min',ct:`<h2>Assurance individuelle accident du sportif</h2><p>L'assurance individuelle accident (IA) couvre les conséquences corporelles d'un accident survenu lors de la pratique sportive, indépendamment de toute responsabilité.</p><h3>Garanties principales</h3><ul><li><strong>Décès accidentel</strong> : versement d'un capital aux bénéficiaires</li><li><strong>Invalidité permanente</strong> : versement d'un capital proportionnel au taux d'invalidité</li><li><strong>Incapacité temporaire</strong> : versement d'indemnités journalières pendant l'arrêt</li><li><strong>Frais médicaux</strong> : remboursement des frais non pris en charge</li></ul><h3>Particularités sportives</h3><p>Les sportifs professionnels font face à des risques physiques élevés. L'assurance doit couvrir :</p><ul><li>Les blessures lors des entraînements et compétitions</li><li>Les rechutes et récidives</li><li>La fin de carrière prématurée pour cause de blessure</li></ul><div class="hl">L'agent doit vérifier que les contrats d'assurance de son client couvrent spécifiquement la pratique sportive professionnelle, qui est souvent exclue des contrats standards.</div>`},
{id:'da4',title:'Garanties spécifiques et fin de carrière',dur:'20 min',ct:`<h2>Garanties spécifiques pour les sportifs</h2><p>Au-delà des assurances classiques, des produits spécifiques existent pour les sportifs professionnels.</p><h3>Assurance perte de valeur</h3><p>Cette assurance compense la perte de valeur marchande d'un joueur suite à une blessure grave. Si le joueur ne peut plus jouer au même niveau, la différence de valeur est indemnisée.</p><h3>Assurance fin de carrière</h3><p>Elle garantit un capital ou une rente en cas de fin de carrière prématurée due à une blessure ou une maladie. C'est une protection cruciale compte tenu de la brièveté des carrières sportives.</p><h3>Assurance transfert</h3><p>Cette assurance protège le club acquéreur en cas de blessure grave du joueur survenant juste après un transfert, avant même qu'il ait pu jouer.</p><div class="wn">L'agent doit systématiquement évoquer ces assurances spécifiques avec ses clients, surtout lors de la signature de contrats importants. C'est une marque de professionnalisme et de responsabilité.</div><h3>Rôle de conseil de l'agent</h3><p>L'agent n'est pas un courtier en assurances, mais il doit orienter son client vers les bonnes couvertures et s'assurer que les aspects assurantiels sont intégrés dans la gestion de carrière globale.</p>`}
],

{q:"L'assurance perte de valeur compense :",o:["La baisse des résultats sportifs","La perte de valeur marchande après blessure","La dépréciation du contrat","Le coût des transferts"],c:1,e:"L'assurance perte de valeur indemnise la différence de valeur marchande du joueur après une blessure grave."},

]},

{id:'ds2',title:'Sociétés & Associations',desc:'Structures des clubs, DNCG, gouvernance',icon:'🏢',color:'#e53e3e',
lessons:[
{id:'sa1',title:'Le club sportif : association vs société',dur:'20 min',ct:`<h2>Le club sportif : association loi 1901 vs société commerciale</h2><p>Les clubs sportifs en France peuvent adopter différentes formes juridiques selon leur taille et leur niveau de compétition.</p><h3>L'association loi 1901</h3><p>La grande majorité des clubs sportifs français sont des associations loi 1901 (à but non lucratif). C'est la forme de base pour les clubs amateurs. L'association est dirigée par un bureau élu (président, trésorier, secrétaire).</p><h3>L'obligation de constitution en société</h3><p>Lorsqu'un club atteint certains seuils (participation à des compétitions professionnelles, chiffre d'affaires dépassant un seuil fixé par décret), il est tenu de constituer une <strong>société commerciale</strong> pour gérer ses activités professionnelles.</p><div class="hl">L'association sportive reste propriétaire du numéro d'affiliation et détient au minimum un tiers du capital et des droits de vote de la société sportive.</div><h3>Conséquences pour l'agent</h3><p>L'agent doit connaître la structure juridique du club avec lequel il négocie : les interlocuteurs, les pouvoirs de signature et les procédures de décision diffèrent selon la forme juridique.</p>`},
{id:'sa2',title:'Les sociétés sportives',dur:'25 min',ct:`<h2>Les sociétés sportives</h2><p>Plusieurs formes de sociétés sportives existent en droit français, chacune avec ses spécificités.</p><h3>La SASP (Société Anonyme Sportive Professionnelle)</h3><p>C'est la forme la plus courante pour les clubs professionnels. Elle permet la distribution de dividendes aux actionnaires et la rémunération des dirigeants. Capital minimum : 37 000 €.</p><h3>La SAOS (Société Anonyme à Objet Sportif)</h3><p>La SAOS ne peut pas distribuer de dividendes. Les bénéfices sont réinvestis dans l'activité sportive. Depuis 2012, les nouveaux clubs ne peuvent plus adopter cette forme.</p><h3>L'EUSRL (Entreprise Unipersonnelle Sportive à Responsabilité Limitée)</h3><p>Forme unipersonnelle pour les petits clubs professionnels. L'association sportive en est l'associé unique.</p><h3>La SEM (Société d'Économie Mixte Sportive)</h3><p>La collectivité territoriale peut détenir des parts, favorisant le financement public du sport.</p><div class="wn">L'agent doit identifier la forme juridique exacte du club pour comprendre sa gouvernance, ses capacités d'investissement et ses processus de décision pour la signature de contrats.</div>`},
{id:'sa3',title:'Gouvernance et contrôle financier',dur:'20 min',ct:`<h2>Gouvernance des clubs et contrôle financier</h2><p>La gouvernance des clubs professionnels est encadrée par des mécanismes de contrôle spécifiques.</p><h3>La DNCG (Direction Nationale du Contrôle de Gestion)</h3><p>La DNCG est l'organe de contrôle financier des clubs professionnels. Elle examine les comptes des clubs et peut :</p><ul><li>Valider ou refuser l'homologation des contrats de joueurs</li><li>Imposer des restrictions de recrutement</li><li>Prononcer des sanctions financières</li><li>Décider de la rétrogradation d'un club</li></ul><div class="hl">Avant toute négociation, l'agent doit s'assurer que le club dispose de la capacité financière validée par la DNCG pour honorer le contrat proposé.</div><h3>Fair-play financier</h3><p>Au niveau européen, l'UEFA impose des règles de fair-play financier (Financial Fair Play puis Financial Sustainability Regulations) qui limitent les dépenses des clubs par rapport à leurs revenus. Ces règles impactent directement les budgets de recrutement et donc les négociations de l'agent.</p>`},
{id:'sa4',title:'L\'agent et les structures juridiques',dur:'20 min',ct:`<h2>L'agent sportif et les structures juridiques</h2><p>L'agent sportif qui souhaite structurer son activité professionnelle doit choisir une forme juridique adaptée et respecter les règles de conformité.</p><h3>Créer son agence</h3><p>Si l'agent choisit de créer une agence (SAS, SARL), il peut employer des collaborateurs (scouts, assistants, juristes) tout en conservant personnellement la licence. Seul le titulaire de la licence peut effectuer les actes réservés à l'agent sportif.</p><h3>Compliance et transparence</h3><ul><li>Déclaration de tous les mandats à la fédération</li><li>Transparence sur les commissions perçues</li><li>Absence de conflits d'intérêts (pas de participation dans un club)</li><li>Respect des règles anti-blanchiment (vigilance sur l'origine des fonds)</li></ul><h3>Relations avec d'autres professionnels</h3><p>L'agent collabore fréquemment avec des avocats mandataires sportifs, des fiscalistes, des experts-comptables et des courtiers en assurance. Il doit coordonner ces intervenants dans l'intérêt de son client.</p><div class="wn">L'agent ne doit jamais se substituer à un professionnel du droit ou de la finance pour des actes qui relèvent de leur compétence exclusive (conseil juridique, actes notariés, audit comptable).</div>`}
],

{id:'ri',title:'Réglementation Internationale',desc:'FIFA, agents FIFA, transferts internationaux',icon:'🌍',color:'#38a169',
lessons:[
{id:'ri1',title:'Le système FIFA',dur:'25 min',ct:`<h2>Le système FIFA</h2><p>La FIFA (Fédération Internationale de Football Association) est l'instance dirigeante du football mondial. Tout agent opérant dans le football international doit connaître son fonctionnement.</p><h3>Organisation</h3><p>La FIFA regroupe 211 associations membres, organisées en 6 confédérations continentales (UEFA, CONMEBOL, CAF, AFC, CONCACAF, OFC). Elle édicte les règles applicables au football international.</p><h3>Statuts FIFA (édition mai 2024)</h3><p>Les Statuts définissent la mission, la structure et les principes de la FIFA. Ils traitent de la gouvernance, des compétitions, de l'arbitrage et des droits des associations membres.</p><h3>Organes clés pour les agents</h3><ul><li><strong>Chambre de Résolution des Litiges (CRL)</strong> : traite les litiges entre joueurs, clubs et agents</li><li><strong>Commission du Statut du Joueur</strong> : gère les questions de statut et de transfert</li><li><strong>Tribunal du Football</strong> : instance juridictionnelle de la FIFA</li></ul><div class="hl">Le Tribunal Arbitral du Sport (TAS) de Lausanne est l'instance d'appel pour les décisions de la FIFA. L'agent doit connaître les voies de recours disponibles.</div>`},
{id:'ri2',title:'Le Règlement des Agents FIFA 2025',dur:'30 min',ct:`<h2>Le Règlement des Agents FIFA (FFAR)</h2><p>Entré en vigueur en 2023 et mis à jour en 2025, le FFAR (FIFA Football Agent Regulations) reforme profondément l'encadrement de la profession au niveau international.</p><h3>La licence FIFA</h3><p>Pour opérer au niveau international, un agent de football doit obtenir la <strong>licence FIFA</strong> en passant l'examen FIFA. Cet examen est organisé par la FIFA elle-même et se tient une fois par an.</p><h3>L'examen FIFA</h3><p>L'examen comporte <strong>150 questions</strong> à choix multiples couvrant :</p><ul><li>Les Statuts FIFA</li><li>Le Règlement des Agents FIFA (FFAR)</li><li>Le RSTJ (Règlement du Statut et du Transfert des Joueurs)</li><li>Le Code Disciplinaire FIFA</li><li>L'éthique et la déontologie</li></ul><div class="hl">Prochain examen FIFA : 28, 29 et 30 avril 2026. La FIFA organise désormais une seule session par an depuis 2025.</div><h3>Obligations des agents FIFA</h3><p>Les agents licenciés FIFA doivent respecter des obligations de formation continue, de transparence financière et de conformité réglementaire. Ils doivent déclarer toutes leurs transactions via la plateforme FIFA.</p>`},
{id:'ri3',title:'Plafonnement des commissions FIFA',dur:'20 min',ct:`<h2>Plafonnement des commissions FIFA</h2><p>Le FFAR introduit un système de plafonnement des commissions qui a fait l'objet de vifs débats dans la profession.</p><h3>Les plafonds</h3><p>Pour les transactions dont la valeur dépasse <strong>200 000 USD</strong> :</p><ul><li><strong>3 %</strong> si l'agent représente le club acquéreur</li><li><strong>6 %</strong> si l'agent représente le joueur</li><li><strong>10 %</strong> si l'agent représente le club vendeur</li></ul><p>En dessous de 200 000 USD, les commissions restent librement négociables.</p><h3>Interdiction de la double représentation</h3><p>Le FFAR interdit strictement la double représentation : un agent ne peut pas représenter deux parties dans la même transaction (cohérent avec le droit français).</p><div class="wn">Certaines dispositions du FFAR relatives au plafonnement sont actuellement suspendues suite à des contentieux juridiques. L'agent doit se tenir informé de l'évolution de la réglementation (cf. Circulaire FIFA n° 1873).</div><h3>Paiements échelonnés</h3><p>Le FFAR encadre également les modalités de paiement des commissions, qui peuvent être échelonnées sur la durée du contrat du joueur.</p>`},
{id:'ri4',title:'RSTJ et transferts internationaux',dur:'25 min',ct:`<h2>RSTJ : Règlement du Statut et du Transfert des Joueurs</h2><p>Le RSTJ (édition juillet 2025) est le texte fondamental qui régit les transferts internationaux de joueurs de football.</p><h3>Le Certificat International de Transfert (CIT)</h3><p>Tout transfert international nécessite un CIT délivré par la fédération du pays d'origine via le système <strong>TMS (Transfer Matching System)</strong> de la FIFA. Le TMS assure la traçabilité et la transparence des transactions.</p><h3>Périodes de transfert</h3><p>Les transferts internationaux ne peuvent s'effectuer que pendant les périodes d'enregistrement fixées par chaque association :</p><ul><li>Première période : entre deux saisons (mercato d'été)</li><li>Deuxième période : au milieu de la saison (mercato d'hiver)</li></ul><h3>Protection des mineurs</h3><p>Le RSTJ contient des règles strictes sur les transferts de mineurs (article 19) :</p><ul><li>Interdiction de principe des transferts internationaux avant 18 ans</li><li>Exception 1 : parents déménageant pour raisons non sportives</li><li>Exception 2 : transfert UE/EEE pour les 16-18 ans avec garanties</li><li>Exception 3 : joueur vivant à moins de 50 km d'une frontière</li></ul><h3>Mécanisme de solidarité</h3><p>Le mécanisme de solidarité prévoit que 5 % de l'indemnité de transfert est redistribué aux clubs ayant formé le joueur entre 12 et 23 ans.</p>`},
{id:'ri5',title:'FIFA Clearing House et indemnités de formation',dur:'20 min',ct:`<h2>FIFA Clearing House et indemnités de formation</h2><h3>La FIFA Clearing House</h3><p>Créée pour assurer la traçabilité financière des transferts internationaux, la FIFA Clearing House est un système de chambre de compensation qui :</p><ul><li>Centralise les paiements liés aux transferts</li><li>Distribue automatiquement les contributions de solidarité</li><li>Vérifie la conformité des transactions</li><li>Lutte contre le blanchiment d'argent</li></ul><h3>Indemnités de formation</h3><p>Le RSTJ prévoit des indemnités de formation (training compensation) versées au club formateur lorsqu'un joueur signe son premier contrat professionnel ou est transféré avant 23 ans :</p><ul><li>Calculées en fonction de la catégorie du club formateur</li><li>Couvrent la période de formation entre 12 et 21 ans (ou 23 ans pour le premier contrat)</li><li>Réparties entre tous les clubs ayant participé à la formation</li></ul><div class="hl">L'agent doit intégrer les indemnités de formation et le mécanisme de solidarité dans ses calculs lors des négociations, car ils impactent le coût total d'un transfert pour le club acquéreur.</div><h3>Contribution de solidarité</h3><p>Distincte de l'indemnité de formation, la contribution de solidarité (5 % de l'indemnité de transfert) est due à chaque transfert international d'un joueur professionnel, répartie entre les clubs formateurs.</p>`}
],

{id:'pp',title:'Pratique Professionnelle',desc:'Gestion de carrière, éthique, développement client',icon:'🎯',color:'#dd6b20',
lessons:[
{id:'pp1',title:'Gestion de carrière du sportif',dur:'25 min',ct:`<h2>Gestion de carrière du sportif</h2><p>L'agent sportif moderne est bien plus qu'un négociateur de contrats. Il est le gestionnaire global de la carrière de son client.</p><h3>Le plan de carrière</h3><p>L'agent élabore avec son client un plan de carrière stratégique tenant compte de :</p><ul><li>L'âge et le potentiel sportif</li><li>Les objectifs sportifs à court, moyen et long terme</li><li>Les aspirations personnelles et familiales</li><li>Les opportunités de marché</li><li>La valeur marchande et son évolution prévisible</li></ul><h3>Gestion de l'image et du personal branding</h3><ul><li>Négociation des contrats de sponsoring et d'endorsement</li><li>Gestion des réseaux sociaux et de la communication</li><li>Protection de l'image et gestion de crise</li><li>Relations presse et médias</li></ul><h3>Anticipation de la reconversion</h3><div class="hl">Un bon agent anticipe la reconversion de son client dès le début de sa carrière : formation continue, investissements patrimoniaux, développement de compétences parallèles, networking. La carrière sportive dure en moyenne 10-15 ans — la vie après le sport dure beaucoup plus longtemps.</div>`},
{id:'pp2',title:'Éthique et déontologie',dur:'20 min',ct:`<h2>Éthique et déontologie de l'agent sportif</h2><p>L'agent sportif est soumis à des obligations déontologiques qui conditionnent le maintien de sa licence et sa réputation professionnelle.</p><h3>Les principes fondamentaux</h3><ul><li><strong>Loyauté</strong> : agir dans l'intérêt exclusif de son mandant</li><li><strong>Transparence</strong> : déclarer tous les conflits d'intérêts, être transparent sur les commissions</li><li><strong>Intégrité</strong> : refuser toute forme de corruption, de pot-de-vin ou de manipulation</li><li><strong>Confidentialité</strong> : protéger les informations confidentielles de ses clients</li><li><strong>Compétence</strong> : maintenir ses connaissances à jour, se former continuellement</li><li><strong>Diligence</strong> : traiter les affaires de ses clients avec soin et dans des délais raisonnables</li></ul><h3>Conflits d'intérêts</h3><p>L'agent doit éviter toute situation de conflit :</p><ul><li>Ne pas représenter deux parties dans la même transaction</li><li>Ne pas avoir d'intérêts financiers dans un club</li><li>Ne pas parier sur les compétitions</li><li>Déclarer tout lien familial ou financier avec une partie prenante</li></ul><div class="wn">Les manquements déontologiques peuvent entraîner la suspension ou le retrait définitif de la licence, indépendamment de toute sanction pénale. La réputation est le capital le plus précieux d'un agent.</div>`},
{id:'pp3',title:'Développer sa clientèle',dur:'20 min',ct:`<h2>Développer sa clientèle</h2><p>Le développement de clientèle est un enjeu majeur pour tout agent sportif, surtout en début d'activité.</p><h3>La prospection (scouting)</h3><p>L'agent doit identifier les talents prometteurs dans les centres de formation, les compétitions jeunes et les championnats nationaux et internationaux. Cela nécessite un réseau de scouts et une présence régulière sur le terrain.</p><h3>Le réseau professionnel</h3><p>Le réseau est l'actif le plus précieux d'un agent :</p><ul><li>Relations avec les directeurs sportifs et présidents de clubs</li><li>Contacts avec d'autres agents (co-représentation possible)</li><li>Liens avec les entraîneurs et staffs techniques</li><li>Relations avec les médias et les sponsors</li></ul><h3>La réputation</h3><div class="hl">Dans le milieu du sport professionnel, la réputation se construit lentement et se détruit rapidement. Un agent reconnu pour son sérieux, sa loyauté et son professionnalisme attire naturellement les meilleurs talents.</div><h3>Communication et visibilité</h3><p>Présence sur les réseaux sociaux professionnels, participation à des événements sportifs et des conférences, publications d'expertise — l'agent doit être visible tout en restant discret sur les négociations en cours.</p>`},
{id:'pp4',title:'Relations clubs et fédérations',dur:'20 min',ct:`<h2>Relations avec les clubs et fédérations</h2><p>L'agent sportif est l'intermédiaire entre le joueur et le monde institutionnel du sport. Il doit maîtriser les codes et les protocoles.</p><h3>Approcher un club</h3><p>La prise de contact avec un club doit être professionnelle et respecter la hiérarchie :</p><ul><li>Identifier le bon interlocuteur (directeur sportif, cellule de recrutement)</li><li>Présenter le joueur avec un dossier complet (CV sportif, vidéos, données statistiques)</li><li>Respecter les périodes de négociation</li><li>Ne jamais approcher un joueur sous contrat sans en informer son club</li></ul><h3>Le timing</h3><p>Le timing est crucial dans le football professionnel :</p><ul><li>Les besoins des clubs évoluent en fonction des résultats et des blessures</li><li>Les budgets se précisent en fonction des recettes (droits TV, qualifications sportives)</li><li>Les fenêtres de transfert imposent des deadlines strictes</li></ul><div class="hl">Un bon agent sait quand pousser une négociation et quand attendre. La patience est souvent plus rentable que la précipitation.</div>`},
{id:'pp5',title:'Cas pratiques de négociation',dur:'25 min',ct:`<h2>Cas pratiques de négociation</h2><p>La négociation est un art qui s'apprend et se perfectionne. Voici les situations types que rencontre un agent sportif.</p><h3>Cas 1 : Premier contrat professionnel</h3><p>Un jeune joueur de 18 ans, formé au club, se voit proposer son premier contrat professionnel. L'agent doit :</p><ul><li>Évaluer la proposition par rapport au marché</li><li>Négocier la durée (2-3 ans généralement pour un premier contrat)</li><li>Inclure des clauses de revalorisation selon les performances</li><li>Protéger les droits d'image du joueur</li><li>S'assurer d'un temps de jeu suffisant pour le développement</li></ul><h3>Cas 2 : Transfert international</h3><p>Un joueur expérimenté reçoit une offre d'un club étranger. L'agent doit :</p><ul><li>Vérifier la crédibilité et la capacité financière du club</li><li>Anticiper les implications fiscales du déménagement</li><li>Négocier une prime de signature pour compenser le déracinement</li><li>Prévoir un logement, une école pour les enfants, un accompagnement linguistique</li></ul><h3>Cas 3 : Renouvellement de contrat</h3><div class="hl">Le renouvellement est souvent la négociation la plus délicate : le joueur est déjà au club, les rapports de force sont connus. L'agent doit créer un levier de négociation tout en préservant la relation entre le joueur et le club.</div><h3>Cas 4 : Gestion de crise</h3><p>Un joueur est mis à l'écart par son entraîneur ou impliqué dans une polémique médiatique. L'agent doit gérer la communication, trouver une solution (prêt, transfert, médiation) et protéger les intérêts de son client.</p>`}
],

{q:"Un agent peut-il détenir des parts dans un club ?",o:["Oui, sans restriction","Oui, avec déclaration","Non, c'est un conflit d'intérêts","Oui, si minoritaire"],c:2,e:"Détenir des parts dans un club constitue un conflit d'intérêts interdit pour un agent."},

{id:'ex',title:'Préparation à l\'Examen',desc:'Méthodologie, révisions, examen blanc',icon:'📋',color:'#667eea',
lessons:[
{id:'ex1',title:'Méthodologie de l\'examen',dur:'15 min',ct:`<h2>Méthodologie de l'examen d'agent sportif</h2><p>Réussir l'examen d'agent sportif nécessite une préparation méthodique et rigoureuse.</p><h3>Format de l'examen</h3><p><strong>Épreuve générale (CIAS) :</strong></p><ul><li>Format : QCM (Questions à Choix Multiples)</li><li>Matières : droit du sport, contrats, fiscal, social, assurances, sociétés/associations</li><li>Note minimale : 10/20</li><li>Durée : variable selon le nombre de questions</li></ul><p><strong>Épreuve spécifique (fédération) :</strong></p><ul><li>Format : QCM</li><li>Matières : règlements fédéraux, nationaux et internationaux de la discipline</li><li>Note minimale : 10/20</li></ul><h3>Conseils de préparation</h3><ul><li>Commencer la préparation au moins 6 mois avant l'examen</li><li>Étudier les textes de loi dans leur version à jour</li><li>S'entraîner avec des QCM types</li><li>Suivre l'actualité juridique et réglementaire du sport</li><li>Rejoindre un groupe de préparation ou une formation spécialisée</li></ul><div class="hl">L'épreuve générale est commune à toutes les disciplines. Sa réussite est valable pour toutes les fédérations. Il suffit ensuite de passer l'épreuve spécifique de chaque fédération souhaitée.</div>`},
{id:'ex2',title:'Révision épreuve générale',dur:'20 min',ct:`<h2>Épreuve générale CIAS : révision transversale</h2><p>L'épreuve générale couvre 7 domaines juridiques. Voici les points essentiels à retenir pour chacun.</p><h3>1. Droit du sport</h3><p>Articles L. 222-5 à L. 222-22 du Code du sport (agents sportifs), organisation du sport en France, dopage, paris sportifs.</p><h3>2. Droit des contrats</h3><p>CDD d'usage sportif (L. 222-2-4), mandat d'agent, obligations contractuelles, responsabilité.</p><h3>3. Droit fiscal</h3><p>Imposition des revenus sportifs (traitements et salaires), droits d'image, régime des impatriés, conventions fiscales.</p><h3>4. Droit social</h3><p>Cotisations sociales, régime général, prévoyance, reconversion.</p><h3>5. Droit des assurances</h3><p>RC professionnelle, assurance individuelle accident, principe indemnitaire.</p><h3>6. Droit des sociétés</h3><p>Formes de sociétés sportives (SASP, SAOS), constitution, gouvernance.</p><h3>7. Droit des associations</h3><p>Association loi 1901, fédérations sportives, agrément, délégation.</p><div class="wn">Conseil : concentrez-vous sur les articles clés du Code du sport (agents sportifs) et les chiffres importants (10 % commission, 2 ans/30 000 € sanctions, CDD 1-5 saisons). Ce sont les questions les plus fréquentes.</div>`},
{id:'ex3',title:'Révision épreuve spécifique',dur:'20 min',ct:`<h2>Épreuve spécifique : révision par fédération</h2><p>L'épreuve spécifique varie selon la fédération. Voici les principaux textes à maîtriser.</p><h3>Football (FFF / FIFA)</h3><ul><li>Statuts de la FIFA (édition mai 2024)</li><li>Règlement des Agents FIFA (FFAR 2025)</li><li>RSTJ (édition juillet 2025)</li><li>Statuts et Règlements Généraux de la FFF (saison 2025-2026)</li><li>Règlement des agents sportifs de la FFF</li></ul><h3>Basketball (FFBB)</h3><ul><li>Règlements généraux de la FFBB</li><li>Statuts de la FIBA</li><li>Règlement des agents de la FIBA</li></ul><h3>Rugby (FFR)</h3><ul><li>Règlements généraux de la FFR/LNR</li><li>Statuts de World Rugby</li><li>Règlement des agents de World Rugby</li></ul><h3>Handball (FFHB)</h3><ul><li>Règlements de la FFHB/LNH</li><li>Statuts de l'IHF</li></ul><div class="hl">Conseil : téléchargez et imprimez les textes officiels. Étudiez-les article par article. Les questions de l'épreuve spécifique sont souvent très précises sur des numéros d'articles ou des procédures spécifiques.</div>`},
{id:'ex4',title:'Examen blanc',dur:'30 min',ct:`<h2>Examen blanc</h2><p>Cet examen blanc simule les conditions réelles de l'épreuve générale. Il couvre l'ensemble des matières au programme.</p><div class="hl">Lancez le quiz de ce module pour accéder à l'examen blanc complet de 15 questions. Objectif : obtenir au moins 10/20 (soit 8 bonnes réponses sur 15).</div><h3>Conseils pour le jour de l'examen</h3><ul><li>Lisez chaque question attentivement, deux fois</li><li>Attention aux formulations négatives ("ne... pas", "sauf", "à l'exception de")</li><li>En cas de doute, éliminez les réponses manifestement fausses</li><li>Ne changez pas une réponse sauf si vous êtes sûr de l'erreur</li><li>Gérez votre temps : ne passez pas trop longtemps sur une question</li><li>Les questions portent sur les textes en vigueur, pas sur la pratique ou les usages</li></ul><h3>Thèmes les plus fréquents</h3><p>D'après les retours d'expérience, les thèmes suivants reviennent régulièrement :</p><ul><li>Articles du Code du sport sur les agents</li><li>Conditions de la licence et incompatibilités</li><li>Règles du mandat et de la rémunération</li><li>CDD sportif et ses particularités</li><li>Protection des mineurs</li><li>Sanctions pénales et disciplinaires</li></ul>`}
],
quizzes:[
{q:"L'activité d'agent sportif est définie par l'article :",o:["L. 222-5","L. 222-7","L. 222-9","L. 222-10"],c:1,e:"L'article L. 222-7 définit l'activité d'agent sportif."},
{q:"Le CDD sportif a une durée de :",o:["6 mois à 3 ans","1 à 5 saisons","1 à 3 saisons","2 à 4 ans"],c:1,e:"La durée du CDD sportif est de 1 à 5 saisons sportives."},
{q:"L'exercice sans licence est puni de :",o:["1 an / 15 000 €","2 ans / 30 000 €","5 ans / 75 000 €","6 mois / 7 500 €"],c:1,e:"2 ans d'emprisonnement et 30 000 € d'amende (article L. 222-17)."},
{q:"Le double mandatement est :",o:["Autorisé avec accord","Toléré en pratique","Strictement interdit","Autorisé sous conditions"],c:2,e:"Le double mandatement pour une même opération est strictement interdit."},
{q:"La CIAS est rattachée à :",o:["La FIFA","Le Ministère des Sports","Le CNOSF","La FFF"],c:2,e:"La CIAS est rattachée au CNOSF."},
{q:"Le régime des impatriés offre des avantages pendant :",o:["3 ans","5 ans","8 ans","10 ans"],c:2,e:"Le régime des impatriés offre des avantages fiscaux pendant 8 ans."},
{q:"La DNCG contrôle :",o:["Les licences des agents","La gestion financière des clubs","Les résultats sportifs","Le dopage"],c:1,e:"La DNCG contrôle la gestion financière des clubs professionnels."},
{q:"Le mécanisme de solidarité FIFA redistribue :",o:["1 %","3 %","5 %","10 %"],c:2,e:"5 % de l'indemnité de transfert est redistribué aux clubs formateurs."},
{q:"Un agent représentant le joueur est plafonné à (FIFA, >200k USD) :",o:["3 %","6 %","10 %","15 %"],c:1,e:"Le plafond FIFA est de 6 % quand l'agent représente le joueur."},
{q:"Le principe indemnitaire signifie :",o:["L'assureur paie toujours","L'indemnité ≤ préjudice","Pas de franchise","Indemnisation automatique"],c:1,e:"L'indemnité ne peut excéder le préjudice réellement subi."},
{q:"Les transferts internationaux de mineurs sont :",o:["Toujours autorisés","Interdits sauf 3 exceptions","Autorisés dès 14 ans","Libres dans l'UE"],c:1,e:"Interdits en principe avant 18 ans, sauf 3 exceptions (parents, UE 16+, frontière 50km)."},
{q:"L'association sportive détient au minimum :",o:["10 % de la société sportive","25 %","33 % (un tiers)","51 %"],c:2,e:"L'association sportive détient au minimum un tiers du capital et des droits de vote."},
{q:"La manipulation de compétition sportive est punie de :",o:["1 an / 10 000 €","3 ans / 100 000 €","5 ans / 500 000 €","10 ans / 1 M€"],c:2,e:"5 ans d'emprisonnement et 500 000 € d'amende (art. 445-1-1 Code pénal)."},
{q:"Un CDD sportif se transforme-t-il en CDI ?",o:["Oui après 2 renouvellements","Oui après 5 ans","Non, jamais","Oui si le club le souhaite"],c:2,e:"Le CDD sportif ne se transforme jamais en CDI."},
{q:"La rémunération de l'agent est plafonnée à :",o:["5 %","8 %","10 %","15 %"],c:2,e:"Le plafond légal français est de 10 % du montant du contrat (article L. 222-10)."}
]}
];

<div class="mb" style="background:${bc};color:${btc}">${bt}</div></div></div>`}).join('')}</div></div>`};

function rQ(){const m=M.find(x=>x.id===S.cm);if(!m)return'';const qs=S.qs;

<div class="qa">${!qs.a?`<button class="btn btn-p" onclick="sa()" ${qs.so===null?'disabled':''}>Valider</button>`
:`<button class="btn btn-p" onclick="nq()">${qs.i<m.quizzes.length-1?'Question suivante →':'Voir le résultat →'}</button>`}</div></div></div>`};

function rQR(m){const qs=S.qs;const pct=Math.round(qs.s/m.quizzes.length*100);const ps=pct>=60;
const em=pct>=80?'🎉':pct>=60?'👍':'📚';const ms=pct>=80?'Excellent ! Vous maîtrisez ce module !':pct>=60?'Bien joué ! Quiz réussi.':'Continuez à réviser et réessayez.';
return`<div class="ct fi"><button class="lb" onclick="oM('${m.id}')">← Retour au module</button>
<div class="qc"><div class="qr"><div style="font-size:64px;margin-bottom:16px">${em}</div>
<div class="qrs" style="color:${ps?'var(--s)':'var(--a)'}">${pct}%</div>

<button class="btn btn-p" onclick="nav('home')">Retour aux modules</button>

window.nav=function(p){S.page=p;R();window.scrollTo(0,0)};

window.mlc=function(mi,li){if(!S.pr[mi])S.pr[mi]={cl:[],qs:[]};if(!S.pr[mi].cl.includes(li)){S.pr[mi].cl.push(li);ss()}R()};

window.so=function(i){if(S.qs.a)return;S.qs.so=i;R()};
window.sa=function(){if(S.qs.so===null)return;const m=M.find(x=>x.id===S.cm);const q=m.quizzes[S.qs.i];if(S.qs.so===q.c)S.qs.s++;S.qs.a=true;R()};
window.nq=function(){const m=M.find(x=>x.id===S.cm);if(S.qs.i<m.quizzes.length-1){S.qs.i++;S.qs.a=false;S.qs.so=null;R();window.scrollTo(0,0)}else{const pct=Math.round(S.qs.s/m.quizzes.length*100);if(!S.pr[m.id])S.pr[m.id]={cl:[],qs:[]};S.pr[m.id].qs.push(pct);S.qs.f=true;ss();R()}};
